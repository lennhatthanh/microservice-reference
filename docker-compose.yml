services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce_password}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/scripts/create-dbs.sql:/docker-entrypoint-initdb.d/01-create-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ecommerce}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ecommerce_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    environment:
      DATABASE_URL: ${USER_DATABASE_URL:-postgresql+psycopg2://ecommerce:ecommerce_password@postgres:5432/user_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-dev-secret}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ecommerce:ecommerce_password@rabbitmq:5672/}
      ENABLE_MQ: "true"
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 12

  product-service:
    build:
      context: .
      dockerfile: apps/product-service/Dockerfile
    environment:
      DATABASE_URL: ${PRODUCT_DATABASE_URL:-postgresql+psycopg2://ecommerce:ecommerce_password@postgres:5432/product_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ecommerce:ecommerce_password@rabbitmq:5672/}
      ENABLE_MQ: "true"
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 12

  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    environment:
      DATABASE_URL: ${ORDER_DATABASE_URL:-postgresql+psycopg2://ecommerce:ecommerce_password@postgres:5432/order_db}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL:-http://product-service:8000}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8000}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8000}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ecommerce:ecommerce_password@rabbitmq:5672/}
      ENABLE_MQ: "true"
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 12

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    environment:
      DATABASE_URL: ${PAYMENT_DATABASE_URL:-postgresql+psycopg2://ecommerce:ecommerce_password@postgres:5432/payment_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ecommerce:ecommerce_password@rabbitmq:5672/}
      ENABLE_MQ: "true"
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 12

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    environment:
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL:-postgresql+psycopg2://ecommerce:ecommerce_password@postgres:5432/notification_db}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://ecommerce:ecommerce_password@rabbitmq:5672/}
      ENABLE_MQ: "true"
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 12

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
      - notification-service
    ports:
      - "8080:80"

volumes:
  postgres-data:
  rabbitmq-data:
